name: build
on:
  pull_request:

  push:
    branches-ignore:
      - main

  workflow_call:
    inputs:
      version:
        description: "Semantic version (e.g., 1.0.0)"
        required: false
        type: string
        default: ""
      skip_tests:
        description: "Skip test job (tests already passed in caller workflow)"
        required: false
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g., 1.0.0)"
        required: false
        type: string
        default: ""
      skip_tests:
        description: "Skip test job (tests already passed in caller workflow)"
        required: false
        type: boolean
        default: true

# Some third-party actions bundle Node.js 20, which GitHub is deprecating in
# favour of Node.js 24. Setting FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 makes the
# GitHub Actions runner execute those actions under Node 24 instead, silencing
# deprecation warnings and future failures.
# Affected actions: pre-commit/action@v3.0.1, docker/build-push-action@v6,
# docker/setup-buildx-action@v3, google-github-actions/auth@v2,
# google-github-actions/setup-gcloud@v2.
# Remove this override once upstream actions ship Node 24 bundles.
# Restrict all tokens to read-only by default (satisfies Token-Permissions scorecard check).
# Jobs that need write access declare it explicitly at the job level.
permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'push' && github.ref_name != 'main')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Fetch base SHA for pre-commit diff
        if: github.event_name == 'pull_request'
        run: git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}

      - name: Run pre-commit on PR diff
        if: github.event_name == 'pull_request'
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}

      - name: Determine pre-commit base ref for push diff
        if: github.event_name == 'push'
        id: push_base
        run: |
          before="${{ github.event.before }}"
          # Trunk-based: feature branches are cut from main. Falls back to the repo
          # default branch if it differs, so the workflow stays valid for any
          # repo/branch layout.
          base_branch="main"
          if ! git ls-remote --exit-code --heads origin "$base_branch" >/dev/null 2>&1; then
            base_branch="${{ github.event.repository.default_branch }}"
          fi
          # Fall back to diffing against the base branch when the "before" SHA is
          # unusable as a git revision. This happens on a brand-new branch
          # (all-zeros sentinel) and after a force-push/rebase (the previous tip
          # is orphaned and no longer exists in the repo).
          use_base=false
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            use_base=true
          else
            git fetch --depth=1 origin "$before" 2>/dev/null || true
            if ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
              use_base=true
            fi
          fi
          if [ "$use_base" = true ]; then
            git fetch --depth=1 origin "$base_branch"
            echo "from_ref=origin/$base_branch" >> "$GITHUB_OUTPUT"
          else
            echo "from_ref=$before" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit on push diff
        if: github.event_name == 'push'
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        with:
          extra_args: --from-ref ${{ steps.push_base.outputs.from_ref }} --to-ref ${{ github.event.after }}

  validate-tool:
    if: >-
      !inputs.skip_tests &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.draft == false)

    uses: ARPA-H-BDF/bdfkb-schema/.github/workflows/ci-validate.yaml@6afe39430894512131b7f86f75ac165e8db65551 # main
    with:
      python-version: '3.12'

  build-prepare:
    needs: [validate-tool]
    # Trunk-based: there is no integration branch to gate a push build on. Pushes
    # to main are excluded by the top-level `branches-ignore: [main]` trigger
    # (they fire release-please.yml instead), and PRs already cover the build
    # path, so the former `push: development` clause is dropped (§5.3).
    #
    # NOTE: keep this comment OUTSIDE the `if:` expression. A `|` block scalar
    # folds trailing comment lines into the expression, which GitHub's expression
    # lexer rejects ("unexpected character '#'") — a workflow startup failure.
    if: >-
      always() &&
      (needs.validate-tool.result == 'success' || needs.validate-tool.result == 'skipped') &&
      (inputs.version != '' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
        github.event.pull_request.draft == false))

    runs-on: ubuntu-latest
    steps:
      - name: No-op
        run: echo "build-prepare complete"
