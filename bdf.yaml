version: "v1.0.0"

tool:
  name: "TIDE 2.0"
  repo_url: "https://github.com/susom/tide2-core"
  tool_homepage: "https://github.com/susom/tide2-core"
  documentation_url: "https://susom.github.io/tide2-core/"
  tool_type: "Library"
  tool_notes: "Data de-identification and anonymization toolkit combining multiple strategies with cryptographic techniques and ML-based entity recognition; runs distributed via Ray (ray.data.map_batches over CPU/GPU actors)"

domains:
  - "healthcare"
  - "privacy"
  - "de-identification"

llm:
  usesLlm: true
  modelsSupported:
    - "google-vertex-ai"   # all provider branches authenticate + run through Vertex AI
  bringOwnKey: true        # user supplies own GCP project / Vertex credentials

input:
  - name: "Clinical Notes"
    dataCategory: "clinical-phenotype"
    dataClass: "unstructured-text"
    dataType: "clinical-ehr"
    dataStandard:
      - "None"
    format:
      - "dataframe"   # Parquet via Ray Data (FileFormat enum lacks "parquet")
      - "json"
      - "txt"
    proprietary: false

output:
  - name: "De-identified Clinical Notes"
    dataCategory: "clinical-phenotype"
    dataClass: "unstructured-text"
    dataType: "clinical-ehr"
    dataStandard:
      - "None"
    format:
      - "dataframe"   # Parquet via Ray Data (FileFormat enum lacks "parquet")
      - "json"
      - "txt"
    proprietary: false

collaborations: []

container:
  container_type: "Docker"   # multi-stage Dockerfile: production-cpu/gpu, development, test

maturity:
  beginning_maturity: 3
  current_maturity: 5

license:
  license_type: "MIT"
  link: "https://github.com/susom/tide2-core/blob/main/LICENSE-MIT"

credit:
  - name: "TIDE 2.0 Team"
    org: "Stanford University"
    role: "Developer"

target_users:
  primary_user:
    user_type: "researcher"
    technical_literacy_level:
      - "intermediate"
      - "advanced"
    biomedical_literacy_level:
      - "intermediate"
      - "advanced"
  secondary_user:
    user_type: "clinician"
    technical_literacy_level:
      - "intermediate"
    biomedical_literacy_level:
      - "expert"
